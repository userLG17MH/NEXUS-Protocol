<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Protocol | v1.8 Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        body { 
            background-color: #000000; 
            color: #00f2ff; 
            font-family: 'Fira Code', monospace; 
            padding: 20px;
        }

        .panel-container {
            border: 2px solid #00ff41;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            background: #050505;
        }

        .input-area {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            padding: 15px;
            color: #00f2ff;
            outline: none;
            transition: border 0.3s;
        }

        .input-area:focus {
            border-color: #00f2ff;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: #222;
            color: #ccc;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid #444;
        }

        .status-footer {
            text-align: center;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 2px;
            margin-top: 40px;
            text-transform: uppercase;
        }

        .byte-box { display: inline-block; padding: 2px 4px; border-radius: 4px; margin: 0 1px; font-size: 0.8rem; font-weight: bold; border: 1px solid transparent; }
        .header-byte { background: #003311; color: #00ff41; border-color: #00ff41; }
        .ver-byte { background: #1e1b4b; color: #818cf8; border-color: #4338ca; }
        .cmd-byte { background: #332200; color: #ffcc00; border-color: #ffcc00; }
        .len-byte { background: #1a2e05; color: #a3e635; border-color: #4d7c0f; }
        .data-byte { background: #222; color: #aaa; border-color: #444; }
        .check-byte { background: #330000; color: #ff4444; border-color: #ff4444; }

        #decodeResult.hidden { display: none; }
        
        .exec-log {
            font-size: 0.7rem;
            color: #00ff41;
            opacity: 0.6;
            margin-top: 10px;
            border-left: 1px solid #00ff41;
            padding-left: 10px;
        }

        .mct-ascii {
            font-size: 10px;
            color: #555;
            background: #0a0a0a;
            padding: 4px;
            border-radius: 4px;
            border: 1px dashed #333;
            margin-top: 4px;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }

        .mono { font-family: 'Fira Code', monospace; }
        .secure-tag { background: #312e81; color: #818cf8; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="max-w-2xl mx-auto">
        
        <!-- SECURITY CONFIGURATION -->
        <div class="panel-container border-indigo-500 bg-indigo-950/10">
            <h2 class="panel-title text-indigo-400">
                <span class="mr-2">🔐</span> Security Vault
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Shared Secret Key (HMAC)</label>
                    <input type="password" id="sharedSecret" value="NEXUS_ALPHA_KEY" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs text-indigo-400 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Device Identity</label>
                    <input type="text" id="deviceId" value="NX-77" maxlength="5" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs text-indigo-400 outline-none">
                </div>
            </div>
        </div>
        
        <!-- TEXT ENCODER PANEL -->
        <div class="panel-container">
            <h2 class="panel-title text-cyan-400">
                <span class="mr-2">📝</span> Packet Compiler <span class="secure-tag uppercase">HMAC-SHA256 Signed</span>
            </h2>
            
            <div class="mb-4 space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Execution Hook</label>
                        <select id="actionType" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs text-green-400 outline-none">
                            <option value="01">01 - SET_ALARM [HH, MM]</option>
                            <option value="02">02 - WEBHOOK_DISPATCH [ID]</option>
                            <option value="0A">0A - CHAIN_SCRIPT [LONG]</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Payload String</label>
                    <textarea id="textInput" placeholder="Enter string..." rows="2" class="input-area resize-none" oninput="NexusUI.syncHex()"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Raw Hex Preview</label>
                    <textarea id="hexPreview" readonly class="w-full bg-black border border-zinc-800 rounded p-3 text-[10px] mono text-cyan-500 outline-none resize-none overflow-hidden" rows="1"></textarea>
                </div>

                <div class="relative">
                    <label class="block text-[10px] text-zinc-500 uppercase font-bold mb-1">MCT App Text View (What you'll see in the app)</label>
                    <div id="mctPreview" class="mct-ascii mono">...</div>
                </div>

                <div class="flex justify-between items-center mt-2">
                    <div id="charCount" class="text-[10px] text-zinc-600 uppercase">0 / 256 Bytes</div>
                    <button onclick="NexusUI.generate()" class="bg-green-900/30 border border-green-500 text-green-400 px-4 py-1 rounded text-[10px] font-bold uppercase hover:bg-green-500 hover:text-black transition-all">
                        Sign & Compile Chain
                    </button>
                </div>
            </div>

            <div id="outputArea" class="hidden mt-4 pt-4 border-t border-zinc-800">
                <p class="text-[10px] text-zinc-600 uppercase mb-2">V7 PACKET (HEADER|VER|CMD|LEN|PAYLOAD...|CRC8):</p>
                <div id="packetSequence" class="space-y-4"></div>
            </div>
        </div>

        <!-- DECODE & EXECUTE PANEL -->
        <div class="panel-container">
            <h2 class="panel-title text-yellow-500">
                <span class="mr-2">🔍</span> Secure Interpreter
            </h2>
            
            <textarea id="inputHex" placeholder="Paste authenticated blocks..." rows="3" class="input-area text-center tracking-widest text-sm resize-none" oninput="NexusUI.handleDecode()"></textarea>
            
            <div id="decodeResult" class="hidden mt-6 p-4 bg-black border border-zinc-800 rounded">
            </div>
        </div>

        <div class="status-footer">
            [v1.8 SECURE] [SHA256-HMAC] [TS-NONCE PROTECTED]
        </div>
    </div>

    <script>
        const NexusCommands = {
            "01": { name: "SET_ALARM", execute: (p, d) => ({ status: "ARMED", summary: `Alarm: ${p[0]}:${p[1]} on ${d}` }) },
            "02": { name: "WEBHOOK_DISPATCH", execute: (p) => ({ status: "DISPATCHED", summary: `Target: 0x${p.join('')}` }) },
            "0A": { name: "CHAIN_SCRIPT", execute: (p) => ({ status: "PROCESSED", summary: `Script data: ${Array.from(p).map(b=>String.fromCharCode(parseInt(b,16))).join('').substring(0,15)}...` }) }
        };

        const NexusProtocol = {
            VERSION: "07",
            HEADER: "AA55",
            
            generateHMAC: async function(key, data) {
                const safeKey = key && key.length > 0 ? key : "DEFAULT_UNSAFE_KEY";
                const encoder = new TextEncoder();
                const keyData = encoder.encode(safeKey);
                const msgData = encoder.encode(data);
                
                const cryptoKey = await window.crypto.subtle.importKey(
                    "raw", 
                    keyData, 
                    { name: "HMAC", hash: "SHA-256" }, 
                    false, 
                    ["sign"]
                );
                const signature = await window.crypto.subtle.sign("HMAC", cryptoKey, msgData);
                return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
            },

            calculateCRC8: function(bytes) {
                let crc = 0x00;
                for (let i = 0; i < bytes.length; i++) {
                    let byte = parseInt(bytes[i], 16);
                    crc ^= byte;
                    for (let j = 0; j < 8; j++) {
                        if (crc & 0x80) crc = (crc << 1) ^ 0x07;
                        else crc <<= 1;
                    }
                    crc &= 0xFF;
                }
                return crc;
            },

            encode: async function(cmd, textInput, deviceId, secret) {
                const encoder = new TextEncoder();
                const payloadBytes = Array.from(encoder.encode(textInput)).map(b => b.toString(16).padStart(2, '0').toUpperCase());
                const timestamp = Math.floor(Date.now() / 1000).toString(16).padStart(8, '0').toUpperCase();
                const nonce = Math.floor(Math.random() * 65535).toString(16).padStart(4, '0').toUpperCase();
                const devHex = Array.from(encoder.encode(deviceId.padEnd(4, '\0').substring(0, 4))).map(b => b.toString(16).padStart(2, '0').toUpperCase());
                
                let packets = [];
                let metadataForHMAC = [this.HEADER, this.VERSION, cmd, payloadBytes.length.toString(16).padStart(2, '0').toUpperCase(), timestamp, nonce, devHex.join('')].join('');
                
                let b0 = [this.HEADER.substring(0,2), this.HEADER.substring(2,4), this.VERSION, cmd, payloadBytes.length.toString(16).padStart(2, '0').toUpperCase(), timestamp.substring(0,2), timestamp.substring(2,4), timestamp.substring(4,6), timestamp.substring(6,8), nonce.substring(0,2), nonce.substring(2,4), ...devHex];
                while(b0.length < 15) b0.push("00");
                b0.push(this.calculateCRC8(b0.slice(0, 15)).toString(16).padStart(2, '0').toUpperCase());
                packets.push({ bytes: b0, type: 'header' });

                for (let i = 0; i < payloadBytes.length; i += 14) {
                    let index = (Math.floor(i/14) + 1).toString(16).padStart(2, '0').toUpperCase();
                    let chunk = payloadBytes.slice(i, i + 14);
                    while(chunk.length < 14) chunk.push("00");
                    let dataBlock = [index, ...chunk];
                    dataBlock.push(this.calculateCRC8(dataBlock.slice(0, 15)).toString(16).padStart(2, '0').toUpperCase());
                    packets.push({ bytes: dataBlock, type: 'data' });
                }
                
                const hmac = await this.generateHMAC(secret, metadataForHMAC + payloadBytes.join(''));
                let hmacBytes = hmac.match(/.{1,2}/g).slice(0, 15);
                while(hmacBytes.length < 15) hmacBytes.push("00");
                hmacBytes.push(this.calculateCRC8(hmacBytes.slice(0, 15)).toString(16).padStart(2, '0').toUpperCase());
                packets.push({ bytes: hmacBytes, type: 'signature' });

                return packets;
            },

            decode: async function(rawLines, currentDeviceId, secret) {
                const lines = rawLines.split('\n').map(l => l.trim().replace(/\s/g, '')).filter(l => l.length === 32);
                if (lines.length < 2) return { valid: false, error: "INCOMPLETE CHAIN" };
                const hBytes = lines[0].match(/.{1,2}/g);
                if (this.calculateCRC8(hBytes.slice(0, 15)).toString(16).padStart(2, '0').toUpperCase() !== hBytes[15]) 
                    return { valid: false, error: "B0 INTEGRITY FAIL" };

                const cmd = hBytes[3];
                const timestampHex = hBytes.slice(5, 9).join('');
                const timestamp = parseInt(timestampHex, 16);
                const devId = hBytes.slice(11, 15).map(b => String.fromCharCode(parseInt(b, 16))).join('').replace(/\0/g, '').trim();
                const now = Math.floor(Date.now() / 1000);
                if (Math.abs(now - timestamp) > 600) return { valid: false, error: "EXPIRED / REPLAY" };
                if (devId !== currentDeviceId.substring(0, 4).trim()) return { valid: false, error: `LOCKED TO: ${devId}` };

                let fullPayload = [];
                for (let i = 1; i < lines.length - 1; i++) {
                    const dBytes = lines[i].match(/.{1,2}/g);
                    if (this.calculateCRC8(dBytes.slice(0, 15)).toString(16).padStart(2, '0').toUpperCase() !== dBytes[15])
                        return { valid: false, error: `B${i} CORRUPT` };
                    fullPayload.push(...dBytes.slice(1, 15));
                }

                const actualPayload = fullPayload.slice(0, parseInt(hBytes[4], 16));
                const lastBlock = lines[lines.length - 1].match(/.{1,2}/g);
                const metaForSign = [this.HEADER, this.VERSION, cmd, hBytes[4], timestampHex, hBytes.slice(9, 11).join(''), hBytes.slice(11, 15).join('')].join('');
                const calculatedHMAC = await this.generateHMAC(secret, metaForSign + actualPayload.join(''));
                
                if (calculatedHMAC.substring(0, 30) !== lastBlock.slice(0, 15).join('')) return { valid: false, error: "SIGNATURE INVALID" };
                const commandDef = NexusCommands[cmd];
                return { valid: true, commandName: commandDef.name, device: devId, exec: commandDef.execute(actualPayload, devId) };
            }
        };

        const NexusUI = {
            syncHex: function() {
                const text = document.getElementById('textInput').value;
                const bytes = new TextEncoder().encode(text);
                
                const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
                document.getElementById('hexPreview').value = hex || '00';
                
                let mctStr = "";
                bytes.forEach(b => {
                    mctStr += (b >= 32 && b <= 126) ? String.fromCharCode(b) : ".";
                });
                document.getElementById('mctPreview').textContent = mctStr || "None";
                document.getElementById('charCount').textContent = `${bytes.length} / 256 Bytes`;
            },

            handleDecode: async function() {
                const input = document.getElementById('inputHex').value.trim();
                const resBox = document.getElementById('decodeResult');
                if (input.length < 64) { resBox.classList.add('hidden'); return; }

                try {
                    const res = await NexusProtocol.decode(input, document.getElementById('deviceId').value, document.getElementById('sharedSecret').value);
                    resBox.classList.remove('hidden');
                    if (!res.valid) {
                        resBox.innerHTML = `<div class="text-red-500 text-xs font-bold uppercase text-center">🛑 EXECUTION HALTED: ${res.error}</div>`;
                    } else {
                        resBox.innerHTML = `
                            <div class="text-center">
                                <div class="text-[10px] text-indigo-400 mb-1">✓ AUTHENTICATED BY ${res.device}</div>
                                <div class="text-lg font-bold text-white uppercase mb-1">${res.commandName}</div>
                                <div class="text-xs text-green-400 font-bold mb-2">${res.exec.status}</div>
                                <div class="text-[10px] text-zinc-400 italic">${res.exec.summary}</div>
                                <div class="exec-log">[${new Date().toLocaleTimeString()}] Nonce verified. HMAC Signature valid. Engine executing payload...</div>
                            </div>
                        `;
                    }
                } catch (e) {
                    resBox.classList.remove('hidden');
                    resBox.innerHTML = `<div class="text-red-500 text-xs font-bold uppercase text-center">SYSTEM ERROR: ${e.message}</div>`;
                }
            },

            generate: async function() {
                const results = await NexusProtocol.encode(
                    document.getElementById('actionType').value,
                    document.getElementById('textInput').value,
                    document.getElementById('deviceId').value,
                    document.getElementById('sharedSecret').value
                );
                
                const container = document.getElementById('packetSequence');
                container.innerHTML = results.map((packet, i) => {
                    const hexStr = packet.bytes.join('');
                    const visualHtml = packet.bytes.map((byte, bi) => {
                        let cls = "data-byte";
                        if (packet.type === 'header') {
                            if (bi < 2) cls = "header-byte"; else if (bi === 2) cls = "ver-byte"; else if (bi === 3) cls = "cmd-byte"; else if (bi === 4) cls = "len-byte";
                        } else if (packet.type === 'data' && bi === 0) cls = "ver-byte";
                        else if (packet.type === 'signature') cls = "cmd-byte";
                        if (bi === 15) cls = "check-byte";
                        return `<span class="byte-box ${cls}">${byte}</span>`;
                    }).join('');

                    return `
                        <div class="space-y-1">
                            <div class="flex flex-wrap gap-1 p-2 bg-zinc-950 rounded border border-zinc-800">${visualHtml}</div>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] text-zinc-700 mono">B${i}</span>
                                <input readonly value="${hexStr}" class="bg-black border border-zinc-800 text-[10px] p-2 rounded w-full mono text-cyan-400 tracking-widest">
                                <button onclick="NexusUI.copy('${hexStr}')" class="copy-btn">Copy</button>
                            </div>
                        </div>`;
                }).join('');
                document.getElementById('outputArea').classList.remove('hidden');
            },

            copy: (val) => { 
                const t = document.createElement("textarea"); document.body.appendChild(t); 
                t.value = val; t.select(); document.execCommand("copy"); 
                document.body.removeChild(t); 
            }
        };
    </script>
</body>
</html>
